name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint Python (ruff)
        run: ruff check .
      - name: Lint shell scripts (shellcheck)
        run: shellcheck setup.sh run_gui.sh run_pipeline.sh routeB_2dgs/run_2dgs.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax-check all Python sources
        run: python -m compileall -q app.py src routeA_photogrammetry routeB_2dgs routeC_feedforward space tests
      - name: Run unit tests
        run: |
          pip install pytest numpy pillow
          pytest tests/ -q
